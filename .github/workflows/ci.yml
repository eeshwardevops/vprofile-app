name: CI Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
  HELM_REPO_NAME: ${{ vars.HELM_REPO_NAME }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

jobs:
  build-and-sonar:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    name: Build, Test, Checkstyle & SonarQube
    runs-on: ubuntu-latest  
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Cache Sonar scanner cache
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar-${{ hashFiles('sonar-project.properties') }}
          restore-keys: |
            ${{ runner.os }}-sonar-

      - name: Build, run unit tests, and generate Checkstyle report
        run: mvn clean verify checkstyle:checkstyle -B

      - name: Run SonarQube scan
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: SonarQube quality gate check
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          pollingTimeoutSec: 600

  docker-build-push:
    if: github.event_name == 'push'
    name: Build Docker image and push to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-sonar
    outputs:
      registry: ${{ steps.set-outputs.outputs.registry }}
      image: ${{ steps.set-outputs.outputs.image }}
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        #id: set-outputs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Docker-files/app/multistage/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set output variables
        id: set-outputs
        run: |
          echo "registry=${{ env.DOCKERHUB_REGISTRY }}" >> $GITHUB_OUTPUT
          echo "image=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKERHUB_REPOSITORY }}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT
        shell: bash

  update-helm:
    if: github.event_name == 'push'
    name: Update Helm values in separate repo
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v6

      - name: Install yq
        run: |
          YQ_VERSION="v4.45.1"
          curl -L "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
          chmod +x /usr/local/bin/yq

      - name: Clone Helm repository
        run: |
          git clone https://${{ secrets.HELM_REPO_USER }}:${{ secrets.GITOPS_PAT }}@github.com/${{ github.repository_owner }}/${{ env.HELM_REPO_NAME }}.git helm-repo

      - name: Update Helm values.yaml image and tag
        run: |
          cd helm-repo
          yq eval '.app.image = strenv(IMAGE) | .app.tag = strenv(IMAGE_TAG)' -i helm/vprofile/values.yaml
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          IMAGE: ${{ needs.docker-build-push.outputs.image }}

      - name: Commit and push Helm repo update
        run: |
          cd helm-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if ! git diff --quiet; then
            git add helm/vprofile/values.yaml
            git commit -m "Update Helm app.image and app.tag to ${IMAGE_TAG} on main"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
        env:
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image_tag }}
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: actions@github.com

